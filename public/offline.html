<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zeiterfassung – Offline</title>
    <style>
      :root {
        --bg: #fbf8f5;
        --fg: #1a1a1a;
        --accent: #4a6fa5;
        --border: #1a1a1a;
        --fs: 18px;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
        font-size: var(--fs);
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .card {
        border: 1px solid var(--border);
        padding: 16px;
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 style="margin: 0 0 12px 0">Offline</h1>
      <div class="card">
        <p style="margin: 0 0 8px 0">
          Zeiterfassung ist gerade offline. Die Oberfläche wird lokal zwischengespeichert, aber beim ersten
          Laden wird einmal Internet benötigt.
        </p>
        <p style="margin: 0">
          Bitte prüfe deine Verbindung und lade neu.
        </p>
      </div>
    </div>
  </body>
</html>
